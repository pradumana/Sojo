<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Social Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%; max-width: 420px;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 2rem; justify-content: center; }
    .logo-icon { font-size: 2rem; }
    .logo-text { font-size: 1.5rem; font-weight: 800; color: white; }
    .logo-text span { background: linear-gradient(135deg,#a855f7,#ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    h2 { color: white; font-size: 1.2rem; font-weight: 700; text-align: center; margin-bottom: 0.4rem; }
    .subtitle { color: rgba(255,255,255,0.45); font-size: 0.85rem; text-align: center; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); font-size: 0.9rem; }
    input {
      width: 100%; padding: 0.8rem 1rem 0.8rem 2.75rem;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: white;
      font-size: 0.92rem; font-family: 'Inter', sans-serif;
      outline: none; transition: all 0.2s;
    }
    input:focus { border-color: #a855f7; background: rgba(168,85,247,0.08); box-shadow: 0 0 0 3px rgba(168,85,247,0.15); }
    input::placeholder { color: rgba(255,255,255,0.2); }
    .toggle-pass { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 0.9rem; padding: 0; }
    .toggle-pass:hover { color: rgba(255,255,255,0.7); }
    .login-btn {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, #6c3de8, #a855f7);
      border: none; border-radius: 10px;
      color: white; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: all 0.2s;
    }
    .login-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(108,61,232,0.4); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3);
      color: #ff6b6b; border-radius: 8px; padding: 0.7rem 1rem;
      font-size: 0.85rem; margin-top: 1rem; display: none;
      align-items: center; gap: 0.5rem;
    }
    .error-msg.show { display: flex; }
    .back-link { display: block; text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.3); font-size: 0.82rem; transition: color 0.2s; }
    .back-link:hover { color: rgba(255,255,255,0.6); }
    .attempts-warn { color: rgba(255,210,0,0.8); font-size: 0.8rem; text-align: center; margin-top: 0.75rem; display: none; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <span class="logo-icon">🌱</span>
    <span class="logo-text">Social<span>Jobs</span></span>
  </div>
  <h2>Admin Dashboard</h2>
  <p class="subtitle">Sign in to manage your website</p>

  <form id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="socialsambhawana@gmail.com" required autocomplete="email" />
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
        <button type="button" class="toggle-pass" id="togglePass" aria-label="Toggle password visibility">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="login-btn" id="loginBtn">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>
    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Invalid email or password.</span>
    </div>
    <p class="attempts-warn" id="attemptsWarn"></p>
  </form>

  <a href="index.html" class="back-link">← Back to website</a>
</div>

<script>
  const API = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
  let attempts = 0;

  // If already logged in, redirect straight to dashboard
  const token = sessionStorage.getItem('sj_admin_token');
  if (token) {
    fetch(`${API}/auth/verify`, { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.json())
      .then(d => { if (d.valid) window.location.href = 'admin.html'; })
      .catch(() => {});
  }

  // Toggle password visibility
  document.getElementById('togglePass').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('loginBtn');
    const errEl = document.getElementById('errorMsg');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errEl.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.success && data.token) {
        sessionStorage.setItem('sj_admin_token', data.token);
        btn.innerHTML = '<i class="fas fa-check"></i> Success! Redirecting...';
        setTimeout(() => window.location.href = 'admin.html', 600);
      } else {
        attempts++;
        showError(data.error || 'Invalid credentials');
        if (attempts >= 3) {
          document.getElementById('attemptsWarn').style.display = 'block';
          document.getElementById('attemptsWarn').textContent = `${attempts} failed attempts. Please double-check your credentials.`;
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      }
    } catch {
      showError('Cannot connect to server. Make sure it is running.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    }
  });

  function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorMsg').classList.add('show');
  }
</script>
</body>
</html>
